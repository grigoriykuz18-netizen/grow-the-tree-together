<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grow The Tree Together — Tree #1</title>
<meta name="description" content="Claim one of only 92 permanent spots on Tree #1.">
<style>
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:#071006;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:white}
.hero{min-height:100vh;position:relative;overflow:hidden}
.visual{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;z-index:0}
.hotspot{position:absolute;z-index:5;display:block;border-radius:16px;text-indent:-9999px;overflow:hidden}
.claim-left{left:2.1%;top:74.5%;width:16.5%;height:6.5%}
.claim-right{right:3.4%;top:62.4%;width:18.2%;height:6.4%}
.prices-link{left:3%;top:83.6%;width:15%;height:4%}
.panel{
  position:fixed;right:22px;bottom:22px;z-index:20;width:min(360px,calc(100vw - 44px));
  background:rgba(255,255,255,.94);color:#17330e;border-radius:24px;padding:18px;
  box-shadow:0 18px 60px rgba(0,0,0,.25);display:none
}
.panel.open{display:block}
.panel h2{margin:0 0 12px;color:#2f6f16;font-size:18px;letter-spacing:.08em;text-transform:uppercase}
.panel input,.panel select{width:100%;height:46px;border-radius:12px;border:1px solid rgba(0,0,0,.14);padding:0 12px;margin-top:10px}
.panel button{width:100%;height:50px;border:0;border-radius:14px;margin-top:12px;background:linear-gradient(135deg,#8fd345,#4b941f);color:white;font-weight:900;cursor:pointer}
.close{position:absolute!important;right:14px!important;top:10px!important;width:auto!important;height:auto!important;background:transparent!important;color:#17330e!important;font-size:24px!important;margin:0!important}
.live-layer{position:absolute;inset:0;z-index:4;pointer-events:none}
.added{position:absolute;transform:translate(-50%,-50%);pointer-events:auto;min-width:110px;min-height:34px;padding:7px 12px;border-radius:999px;font-size:13px;font-weight:900;text-align:center;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.green{background:rgba(115,170,39,.78);color:#102006;border:1px solid rgba(255,255,255,.55)}
.white{background:rgba(255,255,255,.84);color:#30352d;border:1px solid rgba(255,255,255,.8)}
.gold{background:rgba(227,177,36,.84);color:#332000;border:1px solid rgba(255,238,140,.8)}
.mobile{display:none;padding:24px;background:#071006}
.mobile h1{font-family:Georgia,serif;font-size:40px;line-height:.95;margin:0 0 12px}
.mobile p{color:rgba(255,255,255,.78);line-height:1.5}
.mobile a{display:inline-flex;min-height:52px;padding:0 20px;border-radius:14px;background:#6caf2e;color:white;text-decoration:none;align-items:center;font-weight:900}
@media(max-width:850px){
  .hero{min-height:70vh}.hotspot{display:none}.mobile{display:block}.panel{right:12px;bottom:12px;width:calc(100vw - 24px)}
}
</style>
</head>
<body>
<main class="hero">
  <img class="visual" src="./tree-visual.png" alt="Grow The Tree Together Tree #1">
  <a href="#" class="hotspot claim-left" id="claimLeft">Claim</a>
  <a href="#" class="hotspot claim-right" id="claimRight">Claim</a>
  <a href="#prices" class="hotspot prices-link">Prices</a>
  <div class="live-layer" id="liveLayer"></div>
</main>

<section class="mobile" id="prices">
  <h1>Claim one of only 92 permanent spots.</h1>
  <p>Tree #1 has 15 Golden Spots, 34 White Spots and 43 Green Spots.</p>
  <a href="#" id="mobileClaim">Claim Your Spot</a>
</section>

<div class="panel" id="panel">
  <button class="close" id="close">×</button>
  <h2>Claim your spot</h2>
  <input id="name" maxlength="16" placeholder="Name / brand">
  <input id="link" maxlength="48" placeholder="Website / Telegram">
  <select id="type">
    <option value="green">Green Spot — $50</option>
    <option value="white">White Spot — $100</option>
    <option value="gold">Golden Spot — $250</option>
  </select>
  <button id="preview">Preview on tree</button>
</div>

<script>
const panel=document.getElementById("panel");
["claimLeft","claimRight","mobileClaim"].forEach(id=>{
 const el=document.getElementById(id);
 if(el) el.addEventListener("click",e=>{e.preventDefault();panel.classList.add("open")});
});
document.getElementById("close").onclick=()=>panel.classList.remove("open");

const zones={
 gold:[[49,30],[53,34],[46,38],[55,42],[50,46],[44,49],[57,50],[48,55],[54,58],[50,63],[43,43],[59,38],[47,25],[52,25],[51,39]],
 white:[[39,25],[44,24],[58,25],[63,28],[36,33],[42,34],[48,34],[56,34],[64,35],[34,42],[40,43],[46,44],[60,44],[66,45],[37,52],[43,53],[51,53],[59,54],[65,55],[35,62],[42,63],[49,64],[57,64],[64,65],[40,72],[48,73],[56,73],[62,72],[32,50],[68,50],[36,70],[66,70],[45,82],[55,82]],
 green:[[36,15],[42,12],[49,11],[56,12],[63,15],[31,22],[69,22],[27,30],[73,30],[24,40],[76,40],[23,51],[77,51],[25,62],[75,62],[30,72],[70,72],[36,82],[64,82],[43,88],[57,88],[50,91],[29,46],[71,46],[31,58],[69,58],[34,68],[66,68],[39,77],[61,77],[22,34],[78,34],[21,56],[79,56],[28,80],[72,80],[35,90],[65,90],[46,7],[54,7],[32,12],[68,12],[50,84]]
};
let used={gold:0,white:0,green:0};
document.getElementById("preview").onclick=()=>{
 const name=document.getElementById("name").value.trim()||"Your Brand";
 const type=document.getElementById("type").value;
 const arr=zones[type];
 if(used[type]>=arr.length){alert("No more preview spots in this category.");return;}
 const p=arr[used[type]++];
 const el=document.createElement("div");
 el.className="added "+type;
 el.style.left=p[0]+"%"; el.style.top=p[1]+"%";
 el.textContent=(type==="gold"?"⭐ ":type==="white"?"◻ ":"🌿 ")+name;
 document.getElementById("liveLayer").appendChild(el);
 panel.classList.remove("open");
};
</script>
</body>
</html>
